{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto p-6 bg-white shadow-md rounded-xl mt-10">
  <h2 class="text-2xl font-semibold text-blue-600 mb-4">Total Earnings</h2>

  <p class="text-lg mb-4 text-gray-700">You have earned a total of:</p>
  <div class="text-3xl font-bold text-green-600 mb-6">₹{{ total_earnings }}</div>

  <h3 class="text-xl font-semibold text-gray-800 mb-2">Booking Details</h3>
  <table class="w-full border border-gray-300 rounded-lg overflow-hidden">
    <thead class="bg-blue-100">
      <tr>
        <th class="py-2 px-4 text-left">Booking ID</th>
        <th class="py-2 px-4 text-left">Ride Accepter</th>
        
        <th class="py-2 px-4 text-left">Amount</th>
      </tr>
    </thead>
    <tbody>
      {% for b in bookings %}
      <tr class="border-t">
        <td class="py-2 px-4">{{ b.id }}</td>
        <td class="py-2 px-4">{{ b.name.fname }}</td>
     
        <td class="py-2 px-4">₹{{  b.car.price }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
