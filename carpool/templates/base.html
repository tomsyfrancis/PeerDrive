{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Smart Carpool{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Tailwind CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <script>
    // Toggle dropdown visibility
    function toggleDropdown() {
      const menu = document.getElementById("accountDropdown");
      menu.classList.toggle("hidden");
    }

    // Close dropdown when clicking outside
    window.addEventListener('click', function(e) {
      const dropdown = document.getElementById("accountDropdown");
      const button = document.getElementById("profileBtn");
      if (!button.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add("hidden");
      }
    });
  </script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

 <!-- ✅ Navbar -->
<nav class="bg-white shadow-md p-4">
  <div class="flex justify-between items-center max-w-screen-xl mx-auto">
    
    <!-- ✅ Logo + Brand -->
    <div class="flex items-center space-x-2">
      <img src="{% static 'images/logo2.png' %}" alt="Logo" class="h-7 w-7 object-contain">
      <a href="{% url 'home' %}" class="text-lg font-bold" style="color: #1E3A8A;">SmartCarpool</a>
    </div>
    
    <!-- ✅ Navigation Buttons -->
    <div class="flex items-center space-x-4 text-sm">

      <!-- Search Button with Icon -->
      <a href="{% url 'searchmycar' %}#search" class="flex items-center space-x-1 text-blue-700 hover:text-blue-700 font-semibold">
   
        <span>Search</span>
      </a>

      <!-- Post a Ride Button with + Icon -->
      <a href="{% url 'check_ride_info' %}" class="flex items-center space-x-1 text-blue-700 font-semibold hover:underline">
      
        <span>Post a Ride</span>
      </a>

      <!-- ✅ Newly Added Menu Links (Styled Same) -->
      <!-- <a href="{% url 'searchmycar' %}" class="text-blue-700 font-semibold hover:underline">Ride</a> -->
      <!-- <a href="{% url 'payments' %}" class="text-blue-700 font-semibold hover:underline">Payments</a> -->
      <a href="{% url 'dashboard' %}" class="text-blue-700 font-semibold hover:underline">Dashboard</a>
      <a href="{% url 'ride_report' %}" class="text-blue-700 font-semibold hover:underline">Ride Details</a>
      <!-- <a href="{% url 'notifications' %}" class="text-blue-700 font-semibold hover:underline">Notifications</a> -->
   
      <!-- ✅ Account Icon with Dropdown -->
      <div class="relative">
        <button id="profileBtn" onclick="toggleDropdown()" class="focus:outline-none hover:bg-blue-50 p-1.5 rounded-full">
          <img src="{% static 'images/acc.png' %}" alt="Account" class="h-8 w-8 object-cover rounded-full shadow hover:shadow-md">
        </button>

        <!-- Dropdown Menu -->
        <div id="accountDropdown" class="hidden absolute right-0 mt-2 w-36 bg-white border rounded-md shadow-md py-1 z-10">
          {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-red-500 hover:bg-gray-100">Logout</a>
            <a href="{% url 'myaccount' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">My Account</a>
          {% else %}
            <a href="{% url 'login' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Login</a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</nav>


  <!-- Page Content -->
  <main>
    {% block content %}
    {% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white text-center text-gray-500 text-sm p-4 mt-8 border-t">
    © 2025 Smart Carpool. Made with ❤️ in Kerala.
  </footer>

</body>
</html>
