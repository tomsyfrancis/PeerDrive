{% extends 'base.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback | Smart Carpool</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Container -->
  <div class="max-w-2xl mx-auto p-6 mt-10 bg-white shadow-lg rounded-xl">
    <h2 class="text-3xl font-semibold text-center text-blue-600 mb-6">We value your Feedback</h2>
    
    <!-- Feedback Form -->
    <form action="{% url 'submit_feedback' %}" method="POST" class="space-y-4">
      {% csrf_token %}

      <!-- Name -->
      <div>
        <label class="block mb-1 font-medium">Your Name</label>
        <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="John Doe">
      </div>

      <!-- Email -->
      <div>
        <label class="block mb-1 font-medium">Email</label>
        <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="you@example.com">
      </div>

      <!-- Rating -->
      <div>
        <label class="block mb-1 font-medium">Rating</label>
        <select name="rating" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">-- Select Rating --</option>
          <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
          <option value="4">⭐⭐⭐⭐ Good</option>
          <option value="3">⭐⭐⭐ Average</option>
          <option value="2">⭐⭐ Poor</option>
          <option value="1">⭐ Very Poor</option>
        </select>
      </div>

      <!-- Message -->
      <div>
  <label class="block mb-1 font-medium">Your Feedback</label>
  <textarea name="message" rows="5" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Tell us about your experience..."></textarea>
</div>


      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Submit Feedback</button>
      </div>
    </form>
  </div>

</body>
</html>
{% endblock %}
